<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>DTXmania Web (MVP)</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #000;
        color: #fff;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        overflow: hidden;
        height: 100%;
      }
      #app {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
      }
      canvas {
        display: block;
        background: #0b0f1a;
        box-shadow: 0 0 40px rgba(80, 120, 255, 0.35);
        max-width: 100%;
        max-height: 100%;
      }
      #overlay {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: rgba(0, 0, 0, 0.8);
        z-index: 10;
      }
      #overlay button {
        font: inherit;
        font-size: 18px;
        padding: 14px 28px;
        background: #3355ff;
        color: #fff;
        border: 0;
        border-radius: 8px;
        cursor: pointer;
      }
      #overlay .title {
        font-size: 28px;
        margin-bottom: 18px;
      }
      #overlay .hint {
        margin-top: 14px;
        opacity: 0.7;
        font-size: 13px;
        max-width: 520px;
        text-align: center;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="game" width="1280" height="720"></canvas>
    </div>
    <div id="overlay">
      <div>
        <div class="title">DTXmania Web — MVP</div>
        <button id="start">Start (click to allow audio)</button>
        <div class="hint">
          Keys: S/D = Snare, Space = Bass, H = HiHat, J = Left Cymbal, F = Crash,
          U/O = HiTom, A/P = LoTom, G = FloorTom. Drum sounds are synthesized
          for this demo. Esc to restart.
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
