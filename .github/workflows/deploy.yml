name: CI + Pages

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ci:
    name: audit / typecheck / test / build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install
        run: pnpm --dir web install --frozen-lockfile

      - name: Audit (fail on high+)
        run: pnpm --dir web run audit:high

      - name: Typecheck
        run: pnpm --dir web -r typecheck

      - name: Test
        run: pnpm --dir web -r test

      - name: Build app-web
        run: pnpm --dir web --filter @dtxmania/app-web build

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/packages/app-web/dist

  e2e:
    name: playwright e2e
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install
        run: pnpm --dir web install --frozen-lockfile

      # Cache the Playwright browser binary (~350 MB) so repeat runs skip
      # the download. Key is the Playwright package version — browsers
      # are pinned to the package version, so bumping @playwright/test
      # invalidates the cache cleanly.
      - name: Resolve Playwright version
        id: pw-version
        run: |
          v=$(node -p "require('./web/packages/app-web/package.json').devDependencies['@playwright/test']")
          echo "version=${v}" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright Chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm --dir web --filter @dtxmania/app-web exec playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm --dir web --filter @dtxmania/app-web exec playwright install-deps chromium

      - name: Build app-web
        run: pnpm --dir web --filter @dtxmania/app-web build

      - name: Run Playwright e2e
        run: pnpm --dir web --filter @dtxmania/app-web e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            web/packages/app-web/playwright-report/
            web/packages/app-web/test-results/
          retention-days: 14

  deploy:
    name: Deploy to GitHub Pages
    needs: [ci, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
