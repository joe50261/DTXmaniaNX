name: Android (Quest 3 native)

on:
  pull_request:
    paths:
      - 'native/**'
      - '.github/workflows/android.yml'
  push:
    branches: [master]
    paths:
      - 'native/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: assembleDebug
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: native/quest-spatial
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          # Pin the Gradle distribution so the wrapper jar is not required
          # to live in version control. Match `agp` compatibility window:
          # AGP 8.5 needs Gradle >= 8.7.
          gradle-version: "8.7"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK + CMake
        # AGP 8.x does not auto-install the NDK; without these the
        # `externalNativeBuild { cmake { ... } }` block fails with
        # "NDK not configured" before assembleDebug even starts.
        # Pin a recent stable NDK; CMake 3.22.1 matches the version
        # declared in app/build.gradle.kts.
        run: |
          sdkmanager --install "ndk;26.1.10909125" "cmake;3.22.1"

      - name: Unit tests
        # --stacktrace + --info so the actual cause surfaces in the
        # GitHub Actions log when the WebFetch render of the page
        # truncates the deep error context.
        run: gradle :app:testDebugUnitTest --no-daemon --stacktrace --info

      - name: Assemble debug APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace --info

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dtxmania-quest-debug
          path: native/quest-spatial/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14
