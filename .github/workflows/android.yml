name: Android (Quest 3 native)

on:
  pull_request:
    paths:
      - 'native/**'
      - '.github/workflows/android.yml'
  push:
    branches: [master]
    paths:
      - 'native/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

permissions:
  contents: read
  # Needed by the "Post failure log as PR comment" step so CI can post
  # the gradle stack trace back to the PR after a failed assembleDebug.
  pull-requests: write

jobs:
  build:
    name: assembleDebug
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: native/quest-spatial
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          # Pin the Gradle distribution so the wrapper jar is not required
          # to live in version control. Match `agp` compatibility window:
          # AGP 8.5 needs Gradle >= 8.7.
          gradle-version: "8.7"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK + CMake
        # AGP 8.x does not auto-install the NDK; without these the
        # `externalNativeBuild { cmake { ... } }` block fails with
        # "NDK not configured" before assembleDebug even starts.
        # Pin a recent stable NDK; CMake 3.22.1 matches the version
        # declared in app/build.gradle.kts.
        run: |
          sdkmanager --install "ndk;26.1.10909125" "cmake;3.22.1"

      - name: Unit tests
        # tee the gradle output to a file. On failure, copy the tail to
        # $GITHUB_STEP_SUMMARY so the run-summary page (which is
        # WebFetch-readable without auth) shows the actual error
        # instead of just "Process completed with exit code 1".
        run: |
          set -o pipefail
          if ! gradle :app:testDebugUnitTest --no-daemon --stacktrace --info 2>&1 | tee unit-tests.log; then
            {
              echo "## :app:testDebugUnitTest FAILED"
              echo '```'
              tail -200 unit-tests.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Assemble debug APK
        run: |
          set -o pipefail
          if ! gradle :app:assembleDebug --no-daemon --stacktrace --info 2>&1 | tee assemble-debug.log; then
            {
              echo "## :app:assembleDebug FAILED"
              echo '```'
              tail -200 assemble-debug.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Upload gradle logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-logs-${{ github.run_id }}
          path: |
            native/quest-spatial/unit-tests.log
            native/quest-spatial/assemble-debug.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Post failure log as PR comment
        # The GitHub Actions log body itself requires auth to render,
        # so WebFetch (anonymous) can't see compile errors. PR comments
        # are publicly readable via the API. Posting a tail-200 of the
        # failing gradle log here means a CI consumer can pull it via
        # `pull_request_read get_comments` without log download access.
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -e
          LOG=""
          if [ -s unit-tests.log ]; then
            LOG="unit-tests.log"
            HDR=":app:testDebugUnitTest"
          elif [ -s assemble-debug.log ]; then
            LOG="assemble-debug.log"
            HDR=":app:assembleDebug"
          else
            echo "No gradle log produced — failure was earlier in the workflow."
            exit 0
          fi
          {
            echo "### CI failure: \`$HDR\` (run ${{ github.run_id }}, sha ${GITHUB_SHA:0:7})"
            echo
            echo '<details><summary>Last 200 lines of '"$LOG"'</summary>'
            echo
            echo '```'
            tail -200 "$LOG"
            echo '```'
            echo '</details>'
          } > comment.md
          gh pr comment "$PR_NUMBER" --body-file comment.md

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dtxmania-quest-debug
          path: native/quest-spatial/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14
